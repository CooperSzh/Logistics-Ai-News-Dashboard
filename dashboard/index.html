<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>香港物流情報AI看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

  <h1 class="text-2xl font-bold mb-4">香港物流情報AI看板</h1>

  <div id="updateTime" class="text-sm text-gray-500 mb-4"></div>

  <div id="newsList" class="space-y-4"></div>

  <script>
    async function loadData() {
      const res = await fetch("../data/news.json");
      const json = await res.json();

      document.getElementById("updateTime").innerText =
        "更新时间: " + json.update_time;

      const container = document.getElementById("newsList");

      json.data.forEach(item => {
        const div = document.createElement("div");
        div.className = "bg-white p-4 rounded shadow";

        div.innerHTML = `
          <div class="text-sm text-gray-400">${item.source}</div>
          <a href="${item.link}" target="_blank"
             class="text-lg font-semibold text-blue-600 hover:underline">
             ${item.title}
          </a>
          <div class="text-sm text-gray-500">${item.published}</div>
        `;

        container.appendChild(div);
      });
    }

    loadData();
  </script>

</body>
</html>
